<?xml version="1.0" encoding="UTF-8"?>
<!--
  This editable master separates the shared Sanicek badge from the mod-specific
  glyph. Future mod icons can retain the medallion and maker's mark while
  replacing only the group named "mod-glyph" with one strong silhouette.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Clipping is a final invariant: replaceable glyphs can never cross the rim. -->
    <clipPath id="badge-interior">
      <circle cx="128" cy="128" r="101"/>
    </clipPath>
  </defs>

  <!-- The transparent corners let RimWorld present the artwork as a true badge. -->
  <circle cx="128" cy="128" r="116" fill="#e5e4df" stroke="#17191b" stroke-width="8"/>
  <circle cx="128" cy="128" r="103" fill="none" stroke="#737778" stroke-width="3"/>

  <g clip-path="url(#badge-interior)">
    <!-- The crown and its central lobe form one continuous maker's badge. The
         custom S follows that lobe instead of behaving like typeset lettering. -->
    <path id="maker-cap"
          d="M18 12 H238 V77
             C220 78 208 72 197 63
             C181 69 168 82 158 98
             C149 112 139 119 126 119
             C108 119 97 108 85 93
             C74 79 64 68 50 64
             C39 73 29 80 18 82 Z"
          fill="#17191b"/>
    <path id="maker-mark"
          d="M153 39
             C143 27 112 28 103 42
             C93 58 112 65 130 67
             C150 69 160 77 155 91
             C149 107 118 110 100 95"
          fill="none" stroke="#e5e4df" stroke-width="15"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Three pipe feeds converge on one loader that presents a single large round. -->
    <g id="mod-glyph" stroke="#0b0c0d" stroke-linejoin="round">
      <g fill="none" stroke-linecap="round">
        <path d="M82 177 V193 H72 V205" stroke="#0b0c0d" stroke-width="24"/>
        <path d="M104 181 V216" stroke="#0b0c0d" stroke-width="24"/>
        <path d="M126 177 V194 H157 V207" stroke="#0b0c0d" stroke-width="24"/>
        <path d="M82 177 V193 H72 V205" stroke="#b8b9b7" stroke-width="13"/>
        <path d="M104 181 V216" stroke="#e5e4df" stroke-width="13"/>
        <path d="M126 177 V194 H157 V207" stroke="#85898a" stroke-width="13"/>
      </g>

      <path d="M76 127 H130 L143 140 V177 L130 190 H76 L63 177 V140 Z"
            fill="#8d9192" stroke-width="8"/>
      <rect x="77" y="141" width="27" height="35" rx="4"
            fill="#e5e4df" stroke-width="6"/>
      <path d="M99 141 H166 L192 158 L166 175 H99 Z"
            fill="#242729" stroke-width="7"/>
      <path d="M160 142 V174" fill="none" stroke="#b8b9b7" stroke-width="6"/>
    </g>
  </g>
</svg>
