<?xml version="1.0" encoding="UTF-8"?>
<!--
  The approved badge base owns the reusable maker identity. This transparent
  overlay contains only the replaceable mod-specific glyph so other projects
  can keep the frame and provide a different centered silhouette.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- The supplied badge's inner opening is circular; clipping keeps every
         replaceable glyph clear of its metallic rim. -->
    <clipPath id="badge-opening">
      <circle cx="128" cy="128" r="94"/>
    </clipPath>
  </defs>

  <!-- Three pipe feeds converge on one loader that presents a single round. -->
  <g id="mod-glyph" clip-path="url(#badge-opening)"
     stroke="#111315" stroke-linejoin="round">
    <g fill="none" stroke-linecap="round">
      <path d="M82 177 V191 H78 V201" stroke="#111315" stroke-width="22"/>
      <path d="M104 181 V210" stroke="#111315" stroke-width="22"/>
      <path d="M126 177 V192 H157 V204" stroke="#111315" stroke-width="22"/>
      <path d="M82 177 V191 H78 V201" stroke="#b8b9b7" stroke-width="12"/>
      <path d="M104 181 V210" stroke="#e5e4df" stroke-width="12"/>
      <path d="M126 177 V192 H157 V204" stroke="#85898a" stroke-width="12"/>
    </g>

    <path d="M76 127 H130 L143 140 V177 L130 190 H76 L63 177 V140 Z"
          fill="#8d9192" stroke-width="8"/>
    <rect x="77" y="141" width="27" height="35" rx="4"
          fill="#242729" stroke-width="6"/>
    <path d="M99 141 H166 L192 158 L166 175 H99 Z"
          fill="#e5e4df" stroke-width="7"/>
    <path d="M160 142 V174" fill="none" stroke="#747879" stroke-width="6"/>
  </g>
</svg>
